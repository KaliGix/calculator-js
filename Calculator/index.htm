<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    
    <div class="calculator" id="calculator">

        <div class="container-screen">
            <input type="text" class="screen" disabled> 
        </div>

        <div class="container-buttons">
            <button type="button" class="btn" onclick="addNumber(this.textContent);">1</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">2</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">3</button>
            <button type="button" class="btn operator" onclick="addOperator(this.textContent,this)">X</button>
            <button type="button" class="btn"onclick="addNumber(this.textContent)">4</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">5</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">6</button>
            <button type="button" class="btn operator" onclick="addOperator(this.textContent,this)">+</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">7</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">8</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">9</button>
             <button type="button" class="btn operator" onclick="addOperator(this.textContent, this)">-</button>
            <button type="button" class="btn" onclick="addNumber(this.textContent)">0</button>
            <button type="button" class="btn clear" onclick="resetComponetsUI()">AC</button>
            <button type="button" class="btn result" onclick="calculateResult()">=</button>   
            <button type="button" class="btn operator" onclick="addOperator(this.textContent, this)">%</button>
        </div>
        
    
    </div>

    <script type="text/javascript" src="app.js"></script>
</body>
</html>
